<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nuove Uscite – Timeline</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 10px;
    background: transparent;
  }

  h2 {
    font-size: 22px;
    margin-bottom: 15px;
    text-align: center;
  }

  .timeline {
    position: relative;
    margin: 0 auto;
    padding-left: 20px;
    border-left: 3px solid #4CAF50;
    max-width: 600px;
  }

  .entry {
    margin-bottom: 30px;
    position: relative;
  }

  .entry::before {
    content: "";
    width: 12px;
    height: 12px;
    background: #4CAF50;
    border-radius: 50%;
    position: absolute;
    left: -8px;
    top: 4px;
  }

  .entry img {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 10px;
    object-fit: cover;
  }

  .entry-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .entry-date {
    font-size: 13px;
    color: #777;
    margin-bottom: 10px;
  }

  .entry-desc {
    font-size: 14px;
    margin-bottom: 10px;
  }

  .entry a {
    color: #4CAF50;
    font-weight: bold;
    text-decoration: none;
  }
</style>
</head>
<body>

<h2>Nuove Uscite – Timeline</h2>
<div class="timeline" id="timeline"></div>

<script>
const DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS6qbDeXYiws1fG8LR30qmPQX50zqfrY1xW540_BRw-jkEJYFLfraVBJZ_VzRjofvjPgIOss4DlQR10/pub?gid=0&single=true&output=csv";

// CSV parser robusto
function parseCSV(text) {
  const rows = [];
  let current = [];
  let value = "";
  let insideQuotes = false;

  for (let char of text) {
    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      current.push(value);
      value = "";
    } else if (char === "\n" && !insideQuotes) {
      current.push(value);
      rows.push(current);
      current = [];
      value = "";
    } else {
      value += char;
    }
  }
  return rows;
}

async function loadData() {
  const res = await fetch(DATA_URL);
  const text = await res.text();

  const rows = parseCSV(text);
  const headers = rows[0];
  const items = rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = row[i] || "");
    return obj;
  });

  // Ordina per data
  items.sort((a, b) => new Date(b.date) - new Date(a.date));

  const container = document.getElementById("timeline");
  container.innerHTML = "";

  items.forEach(item => {
    const img = item.cover_image || "https://via.placeholder.com/600x300?text=No+Image";

    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <img src="${img}" alt="">
      <div class="entry-title">${item.title}</div>
      <div class="entry-date">${item.date}</div>
      <div class="entry-desc">${item.description}</div>
      <a href="${item.url}" target="_blank">Vai alla pagina</a>
    `;

    container.appendChild(div);
  });
}

loadData();
</script>

</body>
</html>
